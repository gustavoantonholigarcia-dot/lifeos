<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--peach); border-radius: 4px; width: 24px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text); }
  .px   { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); }
</style></head>
<body><div class="card">
  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-mute);">Spacing · base 4 · 4 / 8 / 12 / 16 / 20 / 24 / 32 / 40 / 56 / 72</div>
  <div class="scale">
    <div class="item"><div class="bar" style="height:4px;"></div><div class="name">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px;"></div><div class="name">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px;"></div><div class="name">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px;"></div><div class="name">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:20px;"></div><div class="name">5</div><div class="px">20</div></div>
    <div class="item"><div class="bar" style="height:24px;"></div><div class="name">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px;"></div><div class="name">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:40px;"></div><div class="name">10</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="height:56px;"></div><div class="name">14</div><div class="px">56</div></div>
    <div class="item"><div class="bar" style="height:72px;"></div><div class="name">18</div><div class="px">72</div></div>
  </div>
</div></body></html>
