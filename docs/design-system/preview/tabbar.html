<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tabbar {
    background: var(--elev-1);
    border-radius: var(--r-xl);
    padding: 12px 8px;
    display: grid; grid-template-columns: repeat(5, 1fr);
    border-top: 1px solid var(--line);
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 4px;
    color: var(--text-dim);
    font-family: var(--font-body); font-size: 10px;
  }
  .tab.active { color: var(--peach); }
  .tab svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .legend { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mute); }
</style></head>
<body><div class="card">
  <div class="legend">Tab bar · Lucide stroke 1.5 · active = peach</div>
  <div class="tabbar">
    <div class="tab active">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      <span>Hoje</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Semana</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>Módulos</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h11l4 4v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M8 7h6M8 11h8M8 15h6"/></svg>
      <span>Diário</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
      <span>Eu</span>
    </div>
  </div>
</div></body></html>
